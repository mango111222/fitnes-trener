name: Фитнес-тренер

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Generate message
        id: message
        run: |
          DAY_NAME=$(date +%A)
          DAY_NAME_LOWER=$(echo "$DAY_NAME" | tr '[:upper:]' '[:lower:]')
          WORKOUT=$(jq -r ".daily_workout.\"$DAY_NAME_LOWER\"" config.json)
          TARGET=$(jq -r '.water_reminder.target_liters' config.json)
          MESSAGE="Фитнес-тренер приветствует тебя!%0A%0AСегодня: $DAY_NAME%0A%0AТренировка:%0A$WORKOUT%0A%0AНорма воды на сегодня: $TARGET литра%0A%0AЖелаю продуктивной тренировки!"
          echo "text=$MESSAGE" >> $GITHUB_OUTPUT

      - name: Send to Telegram
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${{ steps.message.outputs.text }}"
