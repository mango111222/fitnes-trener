name: –§–Є—В–љ–µ—Б-—В—А–µ–љ–µ—А

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate message
        id: message
        run: |
          DAY_NAME=$(date +%A)
          DAY_NAME_LOWER=$(echo "$DAY_NAME" | tr '[:upper:]' '[:lower:]')
          WORKOUT=$(jq -r ".daily_workout.\"$DAY_NAME_LOWER\"" config.json)
          TARGET=$(jq -r '.water_reminder.target_liters' config.json)
          MESSAGE="рЯПЛпЄП –§–Є—В–љ–µ—Б-—В—А–µ–љ–µ—А –њ—А–Є–≤–µ—В—Б—В–≤—Г–µ—В —В–µ–±—П!\n\n–°–µ–≥–Њ–і–љ—П: $DAY_NAME\n\n–Ґ—А–µ–љ–Є—А–Њ–≤–Ї–∞:\n$WORKOUT\n\n–Э–Њ—А–Љ–∞ –≤–Њ–і—Л –љ–∞ —Б–µ–≥–Њ–і–љ—П: $TARGET –ї–Є—В—А–∞\n\n–Ц–µ–ї–∞—О –њ—А–Њ–і—Г–Ї—В–Є–≤–љ–Њ–є —В—А–µ–љ–Є—А–Њ–≤–Ї–Є!"
          echo "text=$MESSAGE" >> $GITHUB_OUTPUT

      - name: Send to Telegram
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${{ steps.message.outputs.text }}"
